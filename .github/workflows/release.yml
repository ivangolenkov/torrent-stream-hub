name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  packages: write

env:
  APP_NAME: torrent-stream-hub
  GO_VERSION: "1.25.8"
  NODE_VERSION: "22"

jobs:
  binaries:
    name: Build ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macos-arm64
            goos: darwin
            goarch: arm64
            ext: ""
          - name: macos-amd64
            goos: darwin
            goarch: amd64
            ext: ""
          - name: windows-amd64
            goos: windows
            goarch: amd64
            ext: .exe
          - name: linux-amd64
            goos: linux
            goarch: amd64
            ext: ""
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build Web GUI
        working-directory: web
        run: |
          npm ci
          npm run build

      - name: Build binary
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p dist
          go build -trimpath -ldflags="-s -w" -o "dist/${APP_NAME}-${{ matrix.name }}${{ matrix.ext }}" ./cmd/hub

      - name: Package artifact
        run: |
          cd dist
          if [ "${{ matrix.goos }}" = "windows" ]; then
            zip "${APP_NAME}-${{ matrix.name }}.zip" "${APP_NAME}-${{ matrix.name }}${{ matrix.ext }}"
          else
            tar -czf "${APP_NAME}-${{ matrix.name }}.tar.gz" "${APP_NAME}-${{ matrix.name }}${{ matrix.ext }}"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-${{ matrix.name }}
          path: |
            dist/*.tar.gz
            dist/*.zip
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: binaries
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: torrent-stream-hub-*
          path: dist
          merge-multiple: true

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*

  docker:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    env:
      DOCKER_BUILD_RECORD_UPLOAD: "false"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=tag
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ startsWith(github.ref, 'refs/tags/') }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
